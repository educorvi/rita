name: 'size'
on:
  pull_request:
    branches:
      - main
      - 'release/*'

permissions:
  contents: read
concurrency:
  group: size-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true
jobs:
  size:
    runs-on: ubuntu-latest
    env:
      CI_JOB_NUMBER: 1
    steps:
      - uses: actions/checkout@v6
      - name: Cache turbo build setup
        uses: actions/cache@v6
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-
      - name: Enable Corepack
        run: corepack enable
      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: yarn
          cache-dependency-path: yarn.lock
      - name: Install dependencies
        run: yarn install --immutable
      - name: Build published artifacts
        run: yarn turbo build:internal
      - name: Check size limits
        run: yarn size-limit
